services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-1.5-flash
      - BATCH_SIZE=25
      - BATCH_CONCURRENCY=2
      - MAX_RETRIES=3
      - FRONTEND_ORIGIN=http://localhost:3000
      - MAX_FILE_SIZE_MB=5

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
